default_config:
homeassistant:
  customize: !include customize.yaml

frontend:
  themes: !include_dir_merge_named themes

scene: !include scenes.yaml
automation: !include automations.yaml
script: !include scripts.yaml
sensor: !include sensors.yaml
rest: !include rest.yaml
rest_command: !include rest_command.yaml
yahoofinance: !include yahoofinance.yaml
device_tracker:
  - platform: bluetooth_le_tracker
    track_new_devices: false

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - 172.30.33.0/24
    - 192.168.1.3
    - 192.168.1.4

logger:
  logs:
    custom_components.pitboss: debug
    pytboss: info
    homeassistant.components.rest: debug
    homeassistant.components.rest.sensor: debug
    homeassistant.components.rest.binary_sensor: debug
    homeassistant.components.rest_command: debug
  filters:
    custom_components.audiconnect.audi_connect_account:
      - ".*: 403, .*"
      - ".*status=403.*"
      - ".*SSLCertVerificationError.*"
    custom_components.pitboss:
      - ".*Manually updated pitboss data.*"
# influxdb:
#   host: a0d7b954-influxdb
#   port: 8086
#   database: homeassistant
#   username: homeassistant
#   password: !secret influxdb_password
#   max_retries: 3
#   default_measurement: state

input_select:
  meat_probe_white_sensor:
    name: White Probe Sensor
    options:
      - Internal Tip
      - Internal End
      - Ambient
    initial: Internal Tip
  meat_probe_black_sensor:
    name: Black Probe Sensor
    options:
      - Internal Center
      - Ambient
    initial: Internal Center

input_number:
  meat_probe_white_target_temp:
    name: White Probe Target Temp
    min: 100
    max: 250
    step: 1
    unit_of_measurement: '°F'
    initial: 165
    mode: box
  meat_probe_black_target_temp:
    name: Black Probe Target Temp
    min: 100
    max: 250
    step: 1
    unit_of_measurement: '°F'
    initial: 165
    mode: box
