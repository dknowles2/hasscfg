perform_action_when_entity_becomes_available:
  alias: Perform action when entity becomes available
  sequence:
  - if:
    - condition: template
      value_template: '{{ utcnow() - states[repeat.item].last_updated > cooldown }}'
    then: []
    enabled: false
  - action: notify.mobile_app_davids_iphone_14_pro
    data:
      message: Waiting for {{ state_attr(entity_id, 'friendly_name') }} to become
        available before calling {{ action }}
    enabled: false
  - wait_template: '{{ not is_state(entity_id, "unavailable") }}'
    continue_on_timeout: false
    timeout: 01:00:00
  - action: '{{ action }}'
    target:
      entity_id: '{{ entity_id }}'
  - action: notify.mobile_app_davids_iphone_14_pro
    data:
      message: Calling {{ action }} on {{ state_attr(entity_id, 'friendly_name') }}
        ({{ state_translated(entity_id) }})
  fields:
    entity_id:
      selector:
        entity: {}
      name: Entity ID
      required: true
    action:
      selector:
        action: {}
      name: Action
    cooldown:
      selector:
        duration: {}
      name: Cooldown
      default:
        hours: 1
        minutes: 0
        seconds: 0
  description: ''
  mode: parallel
  max: 10
set_shade_position:
  alias: Set shade position
  sequence:
  - if:
    - condition: template
      value_template: '{{ is_state(entity_id, ''unavailable'') }}'
      alias: If shade is unavailable
    then:
    - action: notify.mobile_app_davids_iphone_14_pro
      data:
        message: Waiting for {{ state_attr(entity_id, 'friendly_name') }} to become
          available before setting posiiton to {{ position }}
      enabled: false
    - wait_template: '{{ not is_state(entity_id, ''unavailable'') }}'
      continue_on_timeout: false
      timeout: 01:00:00
    - action: notify.mobile_app_davids_iphone_14_pro
      data:
        message: Setting {{ state_attr(entity_id, 'friendly_name') }} position to
          {{ position }}
  - action: cover.set_cover_position
    target:
      entity_id: '{{ entity_id }}'
    data:
      position: '{{ position }}'
  fields:
    entity_id:
      selector:
        entity: {}
      name: Entity
      required: true
    position:
      selector:
        number:
          min: 0
          max: 100
      name: Position
  description: ''
  mode: parallel
  max: 30
monitor_meat_probe:
  alias: Monitor Meat Probe
  description: Monitors a ThermoPro probe and notifies when target temperature is
    reached
  mode: parallel
  max: 2
  fields:
    probe:
      name: Probe
      required: true
    sensor:
      name: Sensor
      required: true
      default: Internal Tip
    target_temp:
      name: Target Temperature (°F)
      required: true
      selector:
        number:
          min: 100
          max: 250
          unit_of_measurement: °F
  sequence:
  - variables:
      entity_id: sensor.thermopro_{{ probe | lower | trim }}_probe_{{ sensor | lower
        | trim | replace(' ', '_') }}_temperature
  - if:
    - condition: template
      value_template: '{{ states(entity_id) in [''unknown'', ''unavailable''] }}'
    then:
    - action: notify.mobile_app_davids_iphone_16_pro
      data:
        message: Can't find sensor {{ entity_id }} — check probe/sensor selection.
    - stop: Entity unavailable
  - action: notify.mobile_app_davids_iphone_16_pro
    data:
      message: Monitoring {{ probe }} Probe ({{ sensor }}) — target {{ target_temp
        }}°F
      data:
        push:
          live_activity_update_type: start
          activity_id: meat_probe_{{ probe | lower }}
          attributes:
            probe: '{{ probe }}'
            sensor: '{{ sensor }}'
            target_temp: '{{ target_temp }}'
          content_state:
            current_temp: '{{ states(entity_id) | float | round(1) }}'
            target_temp: '{{ target_temp }}'
  - repeat:
      while:
      - condition: template
        value_template: '{{ states(entity_id) | float(0) < target_temp | float }}'
      sequence:
      - delay:
          seconds: 60
      - action: notify.mobile_app_davids_iphone_16_pro
        data:
          message: ''
          data:
            push:
              live_activity_update_type: update
              activity_id: meat_probe_{{ probe | lower }}
              content_state:
                current_temp: '{{ states(entity_id) | float | round(1) }}'
                target_temp: '{{ target_temp }}'
  - action: notify.mobile_app_davids_iphone_16_pro
    data:
      title: Meat is ready!
      message: '{{ probe }} Probe hit {{ target_temp }}°F'
      data:
        push:
          live_activity_update_type: end
          activity_id: meat_probe_{{ probe | lower }}
          interruption-level: critical
          sound:
            name: default
            critical: 1
            volume: 1
start_white_probe_monitoring:
  alias: Start White Probe Monitoring
  sequence:
    - action: script.monitor_meat_probe
      data:
        probe: White
        sensor: "{{ states('input_select.meat_probe_white_sensor') }}"
        target_temp: "{{ states('input_number.meat_probe_white_target_temp') | int }}"
  mode: single
start_black_probe_monitoring:
  alias: Start Black Probe Monitoring
  sequence:
    - action: script.monitor_meat_probe
      data:
        probe: Black
        sensor: "{{ states('input_select.meat_probe_black_sensor') }}"
        target_temp: "{{ states('input_number.meat_probe_black_target_temp') | int }}"
  mode: single
