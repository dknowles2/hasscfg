blueprint:
  name: Shelly 4-Button Remote (ZHA)
  description: 'Automate your Shelly BLU RC Button 4 remote using ZHA events. Supports
    single press, double press, and long press for all 4 buttons. Long press fires
    on release after hold (recall scene #11).'
  source_url: https://gist.github.com/ericf89/3af571fe0344245d17876b6c029fcedb
  domain: automation
  input:
    remote:
      name: Remote
      description: Select the Shelly Wall Switch to use
      selector:
        device:
          integration: zha
          manufacturer: Shelly
          multiple: false
    button_1_single:
      name: Button 1 - Single Press
      default: []
      selector:
        action: {}
    button_1_double:
      name: Button 1 - Double Press
      default: []
      selector:
        action: {}
    button_1_long:
      name: Button 1 - Long Press
      default: []
      selector:
        action: {}
    button_2_single:
      name: Button 2 - Single Press
      default: []
      selector:
        action: {}
    button_2_double:
      name: Button 2 - Double Press
      default: []
      selector:
        action: {}
    button_2_long:
      name: Button 2 - Long Press
      default: []
      selector:
        action: {}
    button_3_single:
      name: Button 3 - Single Press
      default: []
      selector:
        action: {}
    button_3_double:
      name: Button 3 - Double Press
      default: []
      selector:
        action: {}
    button_3_long:
      name: Button 3 - Long Press
      default: []
      selector:
        action: {}
    button_4_single:
      name: Button 4 - Single Press
      default: []
      selector:
        action: {}
    button_4_double:
      name: Button 4 - Double Press
      default: []
      selector:
        action: {}
    button_4_long:
      name: Button 4 - Long Press
      default: []
      selector:
        action: {}
mode: restart
max_exceeded: silent
trigger:
- platform: event
  event_type: zha_event
  event_data:
    device_id: !input remote
action:
- variables:
    command: '{{ trigger.event.data.command }}'
    args: '{{ trigger.event.data.args }}'
    endpoint: '{{ trigger.event.data.endpoint_id }}'
- choose:
  - conditions:
    - '{{ endpoint == 1 }}'
    - '{{ command == ''on'' }}'
    sequence: !input button_1_single
  - conditions:
    - '{{ command == ''recall'' }}'
    - '{{ args == [1, 1, 10] }}'
    sequence: !input button_1_double
  - conditions:
    - '{{ command == ''recall'' }}'
    - '{{ args == [1, 11, 10] }}'
    sequence: !input button_1_long
  - conditions:
    - '{{ endpoint == 1 }}'
    - '{{ command == ''off'' }}'
    sequence: !input button_2_single
  - conditions:
    - '{{ command == ''recall'' }}'
    - '{{ args == [2, 1, 10] }}'
    sequence: !input button_2_double
  - conditions:
    - '{{ command == ''recall'' }}'
    - '{{ args == [2, 11, 10] }}'
    sequence: !input button_2_long
  - conditions:
    - '{{ endpoint == 2 }}'
    - '{{ command == ''on'' }}'
    sequence: !input button_3_single
  - conditions:
    - '{{ command == ''recall'' }}'
    - '{{ args == [3, 1, 10] }}'
    sequence: !input button_3_double
  - conditions:
    - '{{ command == ''recall'' }}'
    - '{{ args == [3, 11, 10] }}'
    sequence: !input button_3_long
  - conditions:
    - '{{ endpoint == 2 }}'
    - '{{ command == ''off'' }}'
    sequence: !input button_4_single
  - conditions:
    - '{{ command == ''recall'' }}'
    - '{{ args == [4, 1, 10] }}'
    sequence: !input button_4_double
  - conditions:
    - '{{ command == ''recall'' }}'
    - '{{ args == [4, 11, 10] }}'
    sequence: !input button_4_long
