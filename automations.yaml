- id: '1751500001'
  alias: ThermoPro - Probe Detected
  description: Sends or clears actionable notification based on probe availability
  triggers:
    - trigger: state
      entity_id:
        - sensor.thermopro_black_probe_ambient_temperature
        - sensor.thermopro_white_probe_ambient_temperature
      from: unavailable
      id: probe_online
    - trigger: state
      entity_id:
        - sensor.thermopro_black_probe_ambient_temperature
        - sensor.thermopro_white_probe_ambient_temperature
      to: unavailable
      id: probe_offline
  conditions: []
  actions:
    - variables:
        tag: "thermopro_{{ trigger.entity_id.split('_')[1] }}_probe"
    - choose:
        - conditions:
            - condition: trigger
              id: probe_online
          sequence:
            - action: notify.mobile_app_davids_iphone_16_pro
              data:
                title: ThermoPro Probes Online
                message: Set up monitoring in the Tools dashboard.
                data:
                  tag: "{{ tag }}"
                  actions:
                    - action: URI
                      title: Set Up
                      uri: /dashboard-tools/meat-probe
        - conditions:
            - condition: trigger
              id: probe_offline
          sequence:
            - action: notify.mobile_app_davids_iphone_16_pro
              data:
                message: clear_notification
                data:
                  tag: "{{ tag }}"
  mode: single
- id: '1751500002'
  alias: ThermoPro - Start Monitoring
  description: Starts probe monitoring when user responds to probe detected notification
  triggers:
  - trigger: event
    event_type: mobile_app_notification_action
  conditions:
  - condition: template
    value_template: '{{ trigger.event.data.action.startswith(''PROBE_'') }}'
  actions:
  - variables:
      parts: '{{ trigger.event.data.action.split(''_'') }}'
      probe: '{{ trigger.event.data.action.split(''_'')[1] | title }}'
      temp_raw: '{{ trigger.event.data.action.split(''_'')[2] }}'
      target_temp: "{% if trigger.event.data.action.split('_')[2] == 'CUSTOM' %}\n
        \ {{ trigger.event.data.reply_text | int(0) }}\n{% else %}\n  {{ trigger.event.data.action.split('_')[2]
        | int }}\n{% endif %}"
      sensor: '{{ ''Internal Tip'' if trigger.event.data.action.split(''_'')[1] ==
        ''WHITE'' else ''Internal Center'' }}'
  - action: script.monitor_meat_probe
    data:
      probe: '{{ probe }}'
      sensor: '{{ sensor }}'
      target_temp: '{{ target_temp }}'
  mode: single
