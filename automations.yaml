- id: '1735483900049'
  alias: Lights - Downstairs Brightness
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - sensor.living_room_esphome_illuminance
  - trigger: state
    entity_id:
    - schedule.downstairs_lights
  conditions: []
  actions:
  - if:
    - condition: or
      conditions:
      - condition: state
        entity_id: schedule.downstairs_lights
        state:
        - 'on'
      - condition: and
        conditions:
        - condition: numeric_state
          entity_id: sensor.living_room_esphome_illuminance
          below: input_number.living_room_lux_lower_bound
    then:
    - action: adaptive_lighting.apply
      metadata: {}
      data:
        lights:
        - light.lamps
        turn_on_lights: true
        transition: '10'
        adapt_brightness: true
        adapt_color: true
      enabled: true
      alias: Turn on lamps
    - action: adaptive_lighting.apply
      metadata: {}
      data:
        lights:
        - light.sconces
        turn_on_lights: true
        transition: '10'
        adapt_brightness: true
      enabled: true
      alias: Turn on sconces
    else:
    - if:
      - condition: or
        conditions:
        - condition: numeric_state
          entity_id: sensor.living_room_esphome_illuminance
          above: input_number.living_room_lux_upper_bound
        - condition: state
          entity_id: schedule.downstairs_lights
          state:
          - 'off'
      then:
      - action: light.turn_off
        metadata: {}
        data:
          transition: 10
        target:
          entity_id:
          - light.sconces
          - light.downstairs_lamps
  - delay:
      hours: 0
      minutes: 5
      seconds: 0
      milliseconds: 0
  trace:
    stored_traces: 200
  mode: single
